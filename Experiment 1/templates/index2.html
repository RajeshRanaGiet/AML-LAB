<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Regression Calculator</title>
</head>
<body>

    <h2>Linear Regression Calculator</h2>
    
    <div>
        <p>First Feature (X Values, comma-separated):</p>
        <input type="text" id="xValues" placeholder="e.g., 1, 2, 3, 4">
    </div>

    <div>
        <p>Second Feature (Y Values, comma-separated):</p>
        <input type="text" id="yValues" placeholder="e.g., 2, 3, 5, 4">
    </div>

    <br>
    <button onclick="calculateRegression()">Calculate</button>

    <div id="result" style="display: none;"></div>
    
    <br>

    <button
        id="visualizeBtn"
        style="display:none;"
        onclick="visualizeGraph()">
        Visualize Graph
    </button>

    <br><br>

    <div id="plotDiv1" style="display:none;">
        <img
            id="graphImage"
            style="max-width:700px;width:100%;border:1px solid #ccc;">
    </div>
    <div id="plotDiv2" style="display:none;">
        <img
            id="metricImage"
            style="max-width:700px;width:100%;border:1px solid #ccc;">
    </div>

    <button
        id="resetBtn"
        style="display:none;"
        onclick="reset()">
        Reset
    </button>

    <script>

        let graphX = [];
        let graphY = [];
        let m = 0, b = 0, mse = 0, mae = 0, rmse = 0, rSquared = 0;



        function calculateRegression() {
            const xInput = document.getElementById('xValues').value;
            const yInput = document.getElementById('yValues').value;

            const xTokens = xInput.split(',');
            const x = [];
            for (let i = 0; i < xTokens.length; i++) {
                const num = parseFloat(xTokens[i]);
                if (!isNaN(num)) x.push(num);
            }

            const yTokens = yInput.split(',');
            const y = [];
            for (let i = 0; i < yTokens.length; i++) {
                const num = parseFloat(yTokens[i]);
                if (!isNaN(num)) y.push(num);
            }

            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';

            if (x.length === 0 || y.length === 0) {
                resultDiv.innerHTML = "Error: Please enter valid numbers.";
                return;
            }
            if (x.length !== y.length) {
                resultDiv.innerHTML = `Error: The number of items must match. (X has ${x.length}, Y has ${y.length})`;
                return;
            }

            const n = x.length;
            let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;

            for (let i = 0; i < n; i++) {
                sumX += x[i];
                sumY += y[i];
                sumXY += (x[i] * y[i]);
                sumXX += (x[i] * x[i]);
            }

            const denominator = (n * sumXX - sumX * sumX);
            
            if (denominator === 0) {
                resultDiv.innerHTML = "Error: Cannot calculate regression (vertical line or identical X values).";
                return;
            }

            m = (n * sumXY - sumX * sumY) / denominator;
            b = (sumY - m * sumX) / n;


            const meanY = sumY / n;
            let sse = 0, sst = 0, maeSum = 0;
            for (let i = 0; i < n; i++) {
                const predY = m * x[i] + b;
                sse += Math.pow(y[i] - predY, 2);
                sst += Math.pow(y[i] - meanY, 2);
                maeSum += Math.abs(y[i] - predY);
            }
            
            mae = maeSum / n;
            mse = sse / n;
            rmse = Math.sqrt(mse);
            rSquared = sst !== 0 ? 1 - (sse / sst) : 1;

            resultDiv.innerHTML = `
                <hr>
                <strong>Equation:</strong> Y = ${m.toFixed(4)}X + ${b.toFixed(4)}<br>
                <strong>Slope (m):</strong> ${m.toFixed(4)} | <strong>Y-Intercept (b):</strong> ${b.toFixed(4)}<br>
                <strong>MAE:</strong> ${mae.toFixed(4)} | <strong>MSE:</strong> ${mse.toFixed(4)} | <strong>RMSE:</strong> ${rmse.toFixed(4)}<br>
                <strong>R² Score:</strong> ${rSquared.toFixed(4)}
            `;

            
            graphX = x;
            graphY = y;

            document.getElementById("visualizeBtn").style.display = "inline-block";
        }


        async function visualizeGraph() {
            const response = await fetch("/visualize_regression", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    x: graphX,
                    y: graphY,
                    m : m,
                    b : b,
                    mse : mse,
                    mae : mae,
                    rmse : rmse,
                    r2 : rSquared
                })
            });

            const data = await response.json();

            document.getElementById("plotDiv1").style.display = "block";
            document.getElementById("plotDiv2").style.display = "block";

            document.getElementById("graphImage").src = data.image1;
            document.getElementById("metricImage").src = data.image2;
            document.getElementById("resetBtn").style.display = "inline-block";
        }

        function reset() {
            document.getElementById("xValues").value = "";
            document.getElementById("yValues").value = "";
            document.getElementById("result").style.display = "none";
            document.getElementById("plotDiv1").style.display = "none";
            document.getElementById("plotDiv2").style.display = "none";
            document.getElementById("visualizeBtn").style.display = "none";
            document.getElementById("resetBtn").style.display = "none";
        }
    </script>

</body>
</html>
